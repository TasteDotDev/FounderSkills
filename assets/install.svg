<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Claude Code -->
  <g transform="translate(40, 28)">
    <rect width="230" height="144" rx="12" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <text x="16" y="30" font-family="system-ui, sans-serif" font-size="18">🟣</text>
    <text x="40" y="32" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#a78bfa">Claude Code</text>
    <rect x="16" y="48" width="198" height="28" rx="6" fill="#0f0f0f"/>
    <text x="24" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">$</text>
    <text x="36" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#a78bfa">claude install</text>
    <text x="16" y="100" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">then use</text>
    <text x="80" y="100" font-family="ui-monospace, monospace" font-size="11" font-weight="bold" fill="#f97316">/founder</text>
    <text x="16" y="126" font-family="ui-monospace, monospace" font-size="10" fill="#4ade80">Skills · Slash commands</text>
  </g>

  <!-- Codex -->
  <g transform="translate(290, 28)">
    <rect width="230" height="144" rx="12" fill="#1e1e2e" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="16" y="30" font-family="system-ui, sans-serif" font-size="18">🟢</text>
    <text x="40" y="32" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#4ade80">OpenAI Codex</text>
    <rect x="16" y="48" width="198" height="28" rx="6" fill="#0f0f0f"/>
    <text x="24" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">$</text>
    <text x="36" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#4ade80">codex skills install</text>
    <text x="16" y="100" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">then use</text>
    <text x="80" y="100" font-family="ui-monospace, monospace" font-size="11" font-weight="bold" fill="#f97316">$founder</text>
    <text x="16" y="126" font-family="ui-monospace, monospace" font-size="10" fill="#4ade80">Agent Skills · .agents/</text>
  </g>

  <!-- Gemini -->
  <g transform="translate(540, 28)">
    <rect width="230" height="144" rx="12" fill="#1e1e2e" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
    <text x="16" y="30" font-family="system-ui, sans-serif" font-size="18">🔵</text>
    <text x="40" y="32" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#60a5fa">Gemini CLI</text>
    <rect x="16" y="48" width="198" height="28" rx="6" fill="#0f0f0f"/>
    <text x="24" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">$</text>
    <text x="36" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#60a5fa">gemini skills install</text>
    <text x="16" y="100" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">auto-activates on</text>
    <text x="16" y="118" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">matching queries</text>
    <text x="16" y="140" font-family="ui-monospace, monospace" font-size="10" fill="#4ade80">Agent Skills · .gemini/</text>
  </g>
</svg>

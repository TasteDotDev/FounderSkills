<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" rx="16" fill="url(#bg)"/>

  <!-- Step 1: Ask -->
  <g transform="translate(40, 30)">
    <rect width="170" height="200" rx="12" fill="#1e1e2e"/>
    <rect x="12" y="12" width="36" height="36" rx="18" fill="#f97316" opacity="0.2"/>
    <text x="24" y="37" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" fill="#f97316">1</text>
    <text x="58" y="37" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">Ask</text>
    <text x="12" y="76" font-family="system-ui, sans-serif" font-size="24">💬</text>
    <text x="12" y="110" font-family="ui-monospace, monospace" font-size="11" fill="#a1a1aa">"Our growth</text>
    <text x="12" y="128" font-family="ui-monospace, monospace" font-size="11" fill="#a1a1aa"> stalled at</text>
    <text x="12" y="146" font-family="ui-monospace, monospace" font-size="11" fill="#a1a1aa"> $5M ARR"</text>
    <text x="12" y="180" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">any business problem</text>
  </g>

  <!-- Arrow 1 -->
  <text x="222" y="140" font-family="ui-monospace, monospace" font-size="20" fill="#3f3f46">→</text>

  <!-- Step 2: Diagnose -->
  <g transform="translate(250, 30)">
    <rect width="170" height="200" rx="12" fill="#1e1e2e"/>
    <rect x="12" y="12" width="36" height="36" rx="18" fill="#8b5cf6" opacity="0.2"/>
    <text x="24" y="37" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" fill="#8b5cf6">2</text>
    <text x="58" y="37" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">Diagnose</text>
    <text x="12" y="76" font-family="system-ui, sans-serif" font-size="24">🔍</text>
    <text x="12" y="110" font-family="ui-monospace, monospace" font-size="11" fill="#a78bfa">Series A plateau</text>
    <text x="12" y="128" font-family="ui-monospace, monospace" font-size="11" fill="#a78bfa">→ channel-model</text>
    <text x="12" y="146" font-family="ui-monospace, monospace" font-size="11" fill="#a78bfa">  mismatch</text>
    <text x="12" y="180" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">picks the right lens</text>
  </g>

  <!-- Arrow 2 -->
  <text x="432" y="140" font-family="ui-monospace, monospace" font-size="20" fill="#3f3f46">→</text>

  <!-- Step 3: Apply -->
  <g transform="translate(460, 30)">
    <rect width="170" height="200" rx="12" fill="#1e1e2e"/>
    <rect x="12" y="12" width="36" height="36" rx="18" fill="#22c55e" opacity="0.2"/>
    <text x="24" y="37" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" fill="#22c55e">3</text>
    <text x="58" y="37" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">Apply</text>
    <text x="12" y="76" font-family="system-ui, sans-serif" font-size="24">⚡</text>
    <text x="12" y="110" font-family="ui-monospace, monospace" font-size="11" fill="#4ade80">Four Fits</text>
    <text x="12" y="128" font-family="ui-monospace, monospace" font-size="11" fill="#4ade80">Growth Accounting</text>
    <text x="12" y="146" font-family="ui-monospace, monospace" font-size="11" fill="#4ade80">Unit Economics</text>
    <text x="12" y="180" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">from 530 frameworks</text>
  </g>

  <!-- Arrow 3 -->
  <text x="642" y="140" font-family="ui-monospace, monospace" font-size="20" fill="#3f3f46">→</text>

  <!-- Step 4: Validate -->
  <g transform="translate(670, 30)">
    <rect width="108" height="200" rx="12" fill="#1e1e2e" stroke="#f97316" stroke-width="1"/>
    <rect x="12" y="12" width="36" height="36" rx="18" fill="#f97316" opacity="0.2"/>
    <text x="24" y="37" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" fill="#f97316">4</text>
    <text x="12" y="76" font-family="system-ui, sans-serif" font-size="24">✅</text>
    <text x="12" y="110" font-family="ui-monospace, monospace" font-size="11" fill="#f5f5f5">Assumptions</text>
    <text x="12" y="128" font-family="ui-monospace, monospace" font-size="11" fill="#f5f5f5">called out</text>
    <text x="12" y="158" font-family="ui-monospace, monospace" font-size="11" fill="#f97316">Next steps</text>
    <text x="12" y="176" font-family="ui-monospace, monospace" font-size="11" fill="#f97316">to test</text>
  </g>
</svg>
